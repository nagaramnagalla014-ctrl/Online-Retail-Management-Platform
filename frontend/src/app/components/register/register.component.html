<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h3 class="card-title text-center mb-4">Create Account</h3>
          <div class="alert alert-danger" *ngIf="error">{{error}}</div>
          <div class="alert alert-success" *ngIf="success">{{success}}</div>
          <form (ngSubmit)="register()">
            <div class="row">
              <div class="col-6">
                <div class="form-group">
                  <label>First Name</label>
                  <input type="text" class="form-control" [(ngModel)]="model.firstName" name="firstName" required>
                </div>
              </div>
              <div class="col-6">
                <div class="form-group">
                  <label>Last Name</label>
                  <input type="text" class="form-control" [(ngModel)]="model.lastName" name="lastName" required>
                </div>
              </div>
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" class="form-control" [(ngModel)]="model.email" name="email" required>
            </div>
            <div class="form-group">
              <label>Phone</label>
              <input type="tel" class="form-control" [(ngModel)]="model.phone" name="phone">
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" class="form-control" [(ngModel)]="model.password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block" [disabled]="loading">
              <span *ngIf="loading" class="spinner-border spinner-border-sm mr-2"></span>
              Register
            </button>
          </form>
          <hr>
          <p class="text-center mb-0">
            Already have an account? <a routerLink="/login">Sign in</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
