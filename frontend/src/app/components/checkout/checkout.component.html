<div class="container mt-4">
  <h2 class="section-title">Checkout</h2>
  <div class="alert alert-danger" *ngIf="error">{{error}}</div>
  <form (ngSubmit)="placeOrder()">
    <div class="row">
      <div class="col-md-7">
        <div class="card mb-3">
          <div class="card-body">
            <h5>Shipping Address</h5>
            <hr>
            <div class="form-group">
              <label>Address</label>
              <textarea class="form-control" [(ngModel)]="model.shippingAddress" name="shippingAddress" rows="2" required></textarea>
            </div>
            <div class="row">
              <div class="col-6">
                <div class="form-group">
                  <label>City</label>
                  <input type="text" class="form-control" [(ngModel)]="model.shippingCity" name="shippingCity" required>
                </div>
              </div>
              <div class="col-6">
                <div class="form-group">
                  <label>State</label>
                  <input type="text" class="form-control" [(ngModel)]="model.shippingState" name="shippingState" required>
                </div>
              </div>
            </div>
            <div class="form-group">
              <label>Pincode</label>
              <input type="text" class="form-control" [(ngModel)]="model.shippingPincode" name="shippingPincode" required>
            </div>
          </div>
        </div>
        <div class="card mb-3">
          <div class="card-body">
            <h5>Payment Method</h5>
            <hr>
            <div class="form-check mb-2">
              <input class="form-check-input" type="radio" [(ngModel)]="model.paymentMethod"
                     name="paymentMethod" value="CREDIT_CARD" id="cc">
              <label class="form-check-label" for="cc">Credit / Debit Card</label>
            </div>
            <div class="form-check mb-2">
              <input class="form-check-input" type="radio" [(ngModel)]="model.paymentMethod"
                     name="paymentMethod" value="NET_BANKING" id="nb">
              <label class="form-check-label" for="nb">Net Banking</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" [(ngModel)]="model.paymentMethod"
                     name="paymentMethod" value="COD" id="cod">
              <label class="form-check-label" for="cod">Cash on Delivery</label>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-5">
        <div class="card">
          <div class="card-body">
            <h5>Order Summary</h5>
            <hr>
            <div class="form-group">
              <label>Promo Code</label>
              <input type="text" class="form-control" [(ngModel)]="model.promoCode"
                     name="promoCode" placeholder="Enter promo code">
            </div>
            <hr>
            <div class="d-flex justify-content-between mb-2">
              <span>Subtotal</span><span>&#8377;{{cartTotal | number:'1.0-0'}}</span>
            </div>
            <div class="d-flex justify-content-between mb-2">
              <span>Shipping</span>
              <span class="text-success">{{shippingCharge === 0 ? 'FREE' : '&#8377;' + shippingCharge}}</span>
            </div>
            <hr>
            <div class="d-flex justify-content-between font-weight-bold">
              <span>Total</span>
              <span class="price-tag">&#8377;{{cartTotal + shippingCharge | number:'1.0-0'}}</span>
            </div>
            <button type="submit" class="btn btn-primary btn-block mt-3" [disabled]="loading">
              <span *ngIf="loading" class="spinner-border spinner-border-sm mr-2"></span>
              Place Order
            </button>
          </div>
        </div>
      </div>
    </div>
  </form>
</div>
