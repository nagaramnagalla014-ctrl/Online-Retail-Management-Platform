<div class="page-hero text-center">
  <div class="container">
    <h1 class="display-4 font-weight-bold">Welcome to RetailShop</h1>
    <p class="lead">Discover thousands of products at unbeatable prices</p>
    <a routerLink="/products" class="btn btn-light btn-lg px-5">Shop Now</a>
  </div>
</div>

<div class="container">
  <!-- Categories -->
  <h2 class="section-title">Shop by Category</h2>
  <div class="row mb-5">
    <div class="col-6 col-md-3 mb-3" *ngFor="let cat of categories">
      <a [routerLink]="['/products']" [queryParams]="{categoryId: cat.categoryId}" class="text-decoration-none">
        <div class="card text-center product-card">
          <div class="card-body">
            <h5 class="card-title text-dark">{{cat.name}}</h5>
            <p class="card-text text-muted small">{{cat.description}}</p>
          </div>
        </div>
      </a>
    </div>
  </div>

  <!-- Featured Products -->
  <h2 class="section-title">Featured Products</h2>
  <div class="text-center py-5" *ngIf="loading">
    <div class="spinner-border text-danger" role="status"></div>
  </div>
  <div class="row" *ngIf="!loading">
    <div class="col-6 col-md-3 mb-4" *ngFor="let product of featuredProducts">
      <div class="card product-card h-100">
        <div class="card-img-top d-flex align-items-center justify-content-center bg-light"
             style="height:200px;font-size:3rem;">&#128722;</div>
        <div class="card-body d-flex flex-column">
          <p class="text-muted small mb-1">{{product.brand}}</p>
          <h6 class="card-title">{{product.name}}</h6>
          <div class="mt-auto">
            <p class="price-tag">&#8377;{{product.price | number:'1.0-0'}}</p>
            <a [routerLink]="['/products', product.productId]" class="btn btn-primary btn-sm btn-block">
              View Details
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
