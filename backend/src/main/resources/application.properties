# =============================================
# Online Retail Management Platform
# Spring Boot Application Configuration
# =============================================

# Application
spring.application.name=retail-platform
server.port=8080
server.servlet.context-path=/

# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/retail_platform?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=retail_user
spring.datasource.password=retail123
spring.datasource.driver-class-name=com.mysql.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5InnoDBDialect

# Session
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true

# Logging
logging.level.com.retail=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=INFO

# File upload limit
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
